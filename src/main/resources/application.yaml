spring:
  application:
    name: oidc-playground
  security:
    oauth2:
      client:
        registration:
          adfs:
            client-id: ${CLIENT_ID}
            client-secret: ${CLIENT_SECRET}
            authorization-grant-type: authorization_code
            scope: openid, profile, email
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
        provider:
          adfs:
            authorization-uri: ${ISSUER_URI}/oauth2/authorize
            token-uri: ${ISSUER_URI}/oauth2/token
            jwk-set-uri: ${ISSUER_URI}/discovery/keys
            user-info-uri: ${ISSUER_URI}/userinfo
            user-name-attribute: sub
  ssl:
    bundle:
      pem:
        adfs:
          truststore:
            certificate: classpath:certs/ca.cer

server:
  port: 9098

logging:
  level:
    com.audenyo.oidcplayground: DEBUG
    org.springframework.security: DEBUG
    org.springframework.security.oauth2: TRACE
