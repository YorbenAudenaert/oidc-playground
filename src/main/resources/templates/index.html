<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>OIDC Playground</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-5">
    <h1>OIDC Playground</h1>
    <p class="text-muted">Test your OIDC provider authentication flows.</p>

    <div th:if="${authenticated}" class="mt-4">
        <div class="alert alert-success">
            Authenticated as <strong th:text="${username}"></strong>
        </div>
        <a href="/user-info" class="btn btn-primary me-2">View User Info / Claims</a>
        <a href="/logout" class="btn btn-outline-secondary">Logout</a>
    </div>

    <div th:unless="${authenticated}" class="mt-4">
        <a href="/oauth2/authorization/adfs" class="btn btn-primary">Login with ADFS</a>
    </div>
</div>
</body>
</html>
